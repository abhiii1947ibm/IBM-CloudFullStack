<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form</title>
    <script>
        function submitForm() {
            const firstName = document.getElementById('firstName').value;
            const age = document.getElementById('age').value;
            const email = document.getElementById('email').value;
            const uname = document.getElementById('uname').value;
            const pword = document.getElementById('pword').value;

            console.log(`Name: ${firstName}, Age: ${age}, Email: ${email}, Username: ${uname}, Password: ${pword}`);
        }
    </script>
</head>
<body>
    <div style="margin:auto">
        <h1>Login Form</h1>
        <label for="firstName">Name:</label>
        <input type="text" id="firstName" placeholder="Enter your name">
        <label for="age">Age:</label>
        <input type="text" id="age" placeholder="Enter your age">
        <label for="email">Email:</label>
        <input type="email" id="email" placeholder="Enter your email">
        <label for="uname">Username:</label>
        <input type="text" id="uname" placeholder="Enter your username">
        <label for="pword">Password:</label>
        <input type="password" id="pword" placeholder="Enter your password">
        <button id="submitBtn" onclick="submitForm()">Submit</button>
    </div>
</body>
</html>
